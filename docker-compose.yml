# TODO: Define your services
#
# Requirements:
# - Service "db": PostgreSQL (postgres:16-alpine)
# - Service "api": your Dockerfile, depends on db
# - api exposes port 8080 on the host
# - Use environment variables from .env for DB credentials
# - Do NOT hardcode passwords in this file
 
version: "3.8" 
services:
  db:
    # image: postgres:16.13-alpine
    image: postgres@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    image: exercise-01-node-registry:1.0.0
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: db
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    ports:
      - "8080:8080"

volumes:
  db_data: